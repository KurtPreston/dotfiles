# Prefix: Ctrl-b -> Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse
set -g mouse on

# 1-based, gap-free numbering
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Scrollback
set -g history-limit 50000

# Snappy for Vim/Neovim
set -sg escape-time 10

# Splits in current path; keep defaults too
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# True color + italics
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,xterm-256color:RGB"

# Minimal status bar
set -g status-style "bg=default,fg=white"
set -g status-left "#[bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=white]%H:%M "
# Per-window color: wt sets @wt_bg/@wt_fg per window (branch color); fall back
# to the default cyan/black when unset (e.g. windows created outside wt).
set -g window-status-current-format "#[bg=#{?@wt_bg,#{@wt_bg},cyan},fg=#{?@wt_fg,#{@wt_fg},black},bold] #I:#W "
set -g window-status-format "#[fg=#{?@wt_bg,#{@wt_bg},white}] #I:#W "
